<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MathForge — Timed math practice for CAT, GMAT, and competitive exams." />
  <meta name="theme-color" content="#130E09" />
  <title>MathForge — Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Nav injected by nav.js -->

  <!-- ── SCREEN: HOME ──────────────────────────────────── -->
  <div id="screen-home" class="screen active">
    <div class="home-header">
      <div class="logo-mark">⚒</div>
      <h1>Math<span>Forge</span></h1>
      <p>Forge your memory. One problem at a time.</p>
    </div>
    <div class="topics-grid" id="topicsGrid"></div>
  </div>

  <!-- ── SCREEN: SETTINGS ──────────────────────────────── -->
  <div id="screen-settings" class="screen">
    <div class="page-wrap">
      <div class="settings-header">
        <div class="topic-badge" id="settingsBadge">🎲</div>
        <div>
          <h2 id="settingsTitle">Random Mix</h2>
          <p id="settingsDesc">Configure your exam session</p>
        </div>
      </div>
      <div class="divider"></div>

      <div class="settings-section">
        <label>Number of Questions <span id="qCountLabel">10</span></label>
        <div class="option-pills" id="qCountPills">
          <div class="pill" data-val="5">5</div>
          <div class="pill active" data-val="10">10</div>
          <div class="pill" data-val="15">15</div>
          <div class="pill" data-val="20">20</div>
          <div class="pill" data-val="custom">Custom</div>
        </div>
        <div class="custom-input-wrap hidden" id="qCountCustomWrap">
          <input type="number" id="qCountCustom" min="1" max="100" value="10" placeholder="e.g. 25" />
          <span>questions (max 100)</span>
        </div>
      </div>

      <div class="settings-section">
        <label>Seconds per Question <span id="timerLabel">5s</span></label>
        <div class="option-pills" id="timerPills">
          <div class="pill" data-val="3">3s</div>
          <div class="pill active" data-val="5">5s</div>
          <div class="pill" data-val="10">10s</div>
          <div class="pill" data-val="15">15s</div>
          <div class="pill" data-val="30">30s</div>
          <div class="pill" data-val="custom">Custom</div>
        </div>
        <div class="custom-input-wrap hidden" id="timerCustomWrap">
          <input type="number" id="timerCustom" min="2" max="120" value="5" placeholder="e.g. 8" />
          <span>seconds per question</span>
        </div>
      </div>

      <div class="divider"></div>
      <div class="settings-actions">
        <button class="btn btn-secondary" onclick="showHome()">← Back</button>
        <button class="btn btn-primary" onclick="startExam()">Begin Exam →</button>
      </div>
    </div>
  </div>

  <!-- ── SCREEN: EXAM ───────────────────────────────────── -->
  <div id="screen-exam" class="screen">
    <div class="exam-topbar">
      <div class="exam-progress-info" id="examProgressInfo">Q 1 / 10</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="exam-score-live" id="scoreLive">
        <span class="c">✓ 0</span>&nbsp;<span class="w">✗ 0</span>
      </div>
    </div>

    <div class="exam-body">
      <div class="timer-ring-wrap">
        <svg width="84" height="84" viewBox="0 0 84 84">
          <circle class="timer-ring-bg"   cx="42" cy="42" r="36" fill="none" stroke-width="6"/>
          <circle class="timer-ring-fill" id="timerRing" cx="42" cy="42" r="36" fill="none" stroke-width="6"
            stroke-dasharray="226.19" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-ring-num" id="timerNum">5</div>
      </div>

      <div class="question-card" id="questionCard">
        <div class="question-topic-tag" id="qTopicTag"></div>
        <div class="question-text" id="qText">Loading…</div>

        <div id="inputWrap">
          <input type="text" class="answer-input" id="answerInput"
            placeholder="Type answer…" autocomplete="off" spellcheck="false" inputmode="decimal" />
          <div class="submit-row">
            <button class="btn btn-primary" onclick="submitAnswer()">Submit</button>
            <button class="btn btn-ghost"   onclick="skipQuestion()">Skip →</button>
          </div>
        </div>

        <div id="mcqWrap" class="hidden">
          <div class="mcq-grid" id="mcqGrid"></div>
          <div class="submit-row">
            <button class="btn btn-ghost" onclick="skipQuestion()">Skip →</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── SCREEN: RESULTS ───────────────────────────────── -->
  <div id="screen-results" class="screen">
    <div class="results-hero">
      <div class="score-ring-wrap">
        <svg width="130" height="130" viewBox="0 0 130 130">
          <circle cx="65" cy="65" r="56" fill="none" stroke="#3D2A16" stroke-width="8"/>
          <circle id="scoreRingFill" cx="65" cy="65" r="56" fill="none" stroke="#D97706"
            stroke-width="8" stroke-dasharray="351.86" stroke-dashoffset="351.86" stroke-linecap="round"/>
        </svg>
        <div class="score-number">
          <span class="big" id="scoreBig">0/0</span>
          <span class="small" id="scorePct">0%</span>
        </div>
      </div>

      <h2 id="resultsHeading">Session Complete</h2>
      <p id="resultsSubtitle">Here's how you did</p>
      <div class="funny-quote" id="funnyQuote"></div>
      <div class="results-stats" id="resultsStats"></div>
    </div>

    <div class="page-wrap" style="padding-top:0">
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterResults('all',this)">All</button>
        <button class="filter-tab" onclick="filterResults('correct',this)">✅ Correct</button>
        <button class="filter-tab" onclick="filterResults('wrong',this)">❌ Wrong</button>
        <button class="filter-tab" onclick="filterResults('timeout',this)">⏱ Timeout</button>
      </div>
    </div>

    <div class="results-list" id="resultsList"></div>

    <div class="results-actions">
      <button class="btn btn-secondary" onclick="showHome()">🏠 Home</button>
      <button class="btn btn-secondary" id="replaySoundBtn" onclick="replayResultSound()">🔊 Your Review Sound</button>
      <button class="btn btn-primary"   onclick="retryExam()">↺ Retry</button>
    </div>
  </div>

  <script src="js/nav.js"></script>
  <script src="js/topics.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/exam.js"></script>
  <script src="js/results.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
