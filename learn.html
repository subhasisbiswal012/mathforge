<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MathForge Learn — Reference notes for squares, cubes, primes, reciprocals and more." />
  <meta name="theme-color" content="#130E09" />
  <title>MathForge — Learn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Nav injected by nav.js -->

  <!-- ── LEARN HOME ─────────────────────────────────────── -->
  <div id="learnHome" class="learn-home">
    <h1>📖 <span>Learn</span></h1>
    <p>Select a topic to open its full reference notes.</p>
    <div class="learn-grid" id="learnGrid">
      <!-- Injected by learn.js -->
    </div>
  </div>

  <!-- ── LEARN TOPIC PAGE ───────────────────────────────── -->
  <div id="learnTopicPage" class="learn-topic hidden">
    <button class="learn-back" onclick="backToLearnHome()">← Back to Topics</button>

    <div class="learn-topic-header">
      <div class="learn-topic-icon" id="learnTopicIcon">n²</div>
      <div>
        <h2 id="learnTopicTitle">Topic</h2>
        <p id="learnTopicDesc">Description</p>
      </div>
    </div>

    <div id="learnTopicContent">
      <!-- Injected by learn.js buildContent() -->
    </div>
  </div>

  <script src="js/nav.js"></script>
  <script src="js/learn.js"></script>
</body>
</html>
